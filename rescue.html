<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --primary-red: #d32f2f; --accent-yellow: #b8860b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 15px; }
        .header { background: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--accent-yellow); border-top: 5px solid var(--primary-red); border-radius: 10px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        th { background: var(--accent-yellow); color: white; padding: 10px; }
        td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        canvas { border: 2px solid var(--accent-yellow); width: 100%; max-width: 120px; height: 50px; background: #fff; cursor: crosshair; display: block; margin: 5px auto; }
        input { width: 90px; padding: 5px; margin-bottom: 5px; border: 1px solid #ccc; }
        button { padding: 8px; background: var(--primary-red); color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="header">
    <h1>هيئة الشارقة للدفاع المدني</h1>
    <h3>دورة: البحث والانقاذ في الاماكن المغلقة | التاريخ: <span id="date"></span></h3>
</div>
<button onclick="exportPDF()">تصدير التقرير PDF</button>

<table id="traineeTable">
    <thead><tr><th>الرقم</th><th>الاسم</th><th>الحضور</th><th>الانصراف</th><th>حفظ</th></tr></thead>
    <tbody id="list"></tbody>
</table>

<script>
    document.getElementById('date').innerText = new Date().toLocaleDateString('ar-EG');
    const trainees = [
        {id: "10393", rank: "شرطي أول", name: "راشد عبدالرحمن عبدالله الظهوري"},
        {id: "10540", rank: "شرطي أول", name: "عبدالعزيز عبدالرحمن الرئيسي"},
        {id: "10551", rank: "شرطي أول", name: "حسن علي الكندي"},
        {id: "10579", rank: "شرطي أول", name: "عبدالرحمن موسى علي"},
        {id: "10583", rank: "شرطي أول", name: "خليفه حميد عبيد السوقي"},
        {id: "10596", rank: "شرطي أول", name: "بلال بسام بلال مبارك"},
        {id: "816", rank: "مدني", name: "محمد صالح الجسمي"},
        {id: "824", rank: "مدني", name: "ياسر خالد الجسمي"},
        {id: "849", rank: "مدني", name: "عيسى علي غلوم"},
        {id: "851", rank: "مدني", name: "سلطان خالد الحمادي"},
        {id: "857", rank: "مدني", name: "محمد سالم الحمادي"}
    ];
    const list = document.getElementById('list');
    trainees.forEach((t, i) => {
        list.innerHTML += `<tr><td>${t.id}</td><td>${t.name}</td>
        <td><input type="time" id="in-time-${i}"><canvas id="in-${i}"></canvas></td>
        <td><input type="time" id="out-time-${i}"><canvas id="out-${i}"></canvas></td>
        <td><button onclick="save(${i})">حفظ</button></td></tr>`;
    });

    const padsIn = trainees.map((_, i) => new SignaturePad(document.getElementById(`in-${i}`)));
    const padsOut = trainees.map((_, i) => new SignaturePad(document.getElementById(`out-${i}`)));

    function save(i) {
        const url = "YOUR_GOOGLE_SCRIPT_URL_HERE";
        fetch(url, { method: "POST", body: JSON.stringify({
            name: trainees[i].name,
            timeIn: document.getElementById(`in-time-${i}`).value,
            timeOut: document.getElementById(`out-time-${i}`).value,
            sigIn: padsIn[i].toDataURL(),
            sigOut: padsOut[i].toDataURL()
        })}).then(() => alert("تم حفظ بيانات " + trainees[i].name));
    }

    function exportPDF() { html2pdf().from(document.getElementById('traineeTable')).save('تقرير_الحضور.pdf'); }
</script>
</body>
</html>
