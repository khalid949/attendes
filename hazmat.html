<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>دورة المواد الخطرة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --primary-red: #d32f2f; --accent-yellow: #b8860b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 15px; }
        .header { background: white; padding: 15px; text-align: center; border-bottom: 5px solid var(--accent-yellow); border-top: 5px solid var(--primary-red); border-radius: 10px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        th { background: var(--accent-yellow); color: white; padding: 10px; }
        td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        canvas { border: 2px solid var(--accent-yellow); width: 120px; height: 50px; background: #fff; cursor: crosshair; display: block; margin: 5px auto; }
        input { width: 80px; padding: 5px; margin-bottom: 5px; }
        button { padding: 8px; background: var(--primary-red); color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="header"><h1>هيئة الشارقة للدفاع المدني</h1><h3>المواد الخطرة | التاريخ: <span id="date"></span></h3></div>

<table id="traineeTable">
    <thead><tr><th>الرقم</th><th>الاسم</th><th>الحضور</th><th>الانصراف</th><th>حفظ</th></tr></thead>
    <tbody id="list"></tbody>
</table>

<script>
    document.getElementById('date').innerText = new Date().toLocaleDateString('ar-EG');
    
    // قائمة الأسماء
    const trainees = [
        {id: "10077", name: "أحمد سعيد المطروشي"}, {id: "10207", name: "عبدالله سعيد الزعابي"},
        {id: "10315", name: "طارق جمعة الزعابي"}, {id: "10319", name: "عبدالله مسعود النقبي"},
        {id: "10325", name: "يوسف سعيد الزعابي"}, {id: "10353", name: "ماجد أحمد الظهوري"},
        {id: "10374", name: "علي محمد البلوشي"}, {id: "10387", name: "عادل هلال الظهوري"},
        {id: "10386", name: "سيف مروان البلوشي"}, {id: "10389", name: "عبدالعزيز حاجي الحمادي"},
        {id: "10390", name: "أحمد راشد القايدي"}
    ];

    const list = document.getElementById('list');
    
    // بناء الجدول فوراً
    trainees.forEach((t, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${t.id}</td><td>${t.name}</td>
        <td><input type="time" id="in-time-${i}"><canvas id="in-${i}"></canvas></td>
        <td><input type="time" id="out-time-${i}"><canvas id="out-${i}"></canvas></td>
        <td><button onclick="save(${i})">حفظ</button></td>`;
        list.appendChild(row);
    });

    // تهيئة التواقيع بعد إضافة العناصر للجدول
    const padsIn = trainees.map((_, i) => new SignaturePad(document.getElementById(`in-${i}`)));
    const padsOut = trainees.map((_, i) => new SignaturePad(document.getElementById(`out-${i}`)));

    function save(i) {
        const url = "https://script.google.com/macros/s/AKfycby_vqS3xOYNirllXDltGRiMVmBA7mEzrassmclFdjByZ5-BVGHPtYj5Sgu-bvYI38fUzw/exec";
        fetch(url, { method: "POST", body: JSON.stringify({
            name: trainees[i].name,
            timeIn: document.getElementById(`in-time-${i}`).value,
            timeOut: document.getElementById(`out-time-${i}`).value,
            sigIn: padsIn[i].toDataURL(),
            sigOut: padsOut[i].toDataURL()
        })}).then(() => alert("تم حفظ بيانات " + trainees[i].name));
    }
</script>
</body>
</html>
